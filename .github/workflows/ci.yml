name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets
      - name: Run doctests
        run: cargo test --doc

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Two WASM outputs, mirroring web/build.sh:
      #   1. raw module for the AudioWorklet  (std, no wasm-bindgen)
      #   2. wasm-bindgen module for the main thread  (web feature)
      - name: Clippy (web feature, wasm target)
        run: cargo clippy --lib --no-default-features --features web --target wasm32-unknown-unknown -- -D warnings
      - name: Build raw WASM (AudioWorklet)
        run: cargo build --lib --release --target wasm32-unknown-unknown --no-default-features --features std
      - name: Build wasm-bindgen WASM (main thread)
        run: cargo build --lib --release --target wasm32-unknown-unknown --no-default-features --features web
