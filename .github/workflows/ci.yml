name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets
      - name: Run doctests
        run: cargo test --doc

  haskell:
    name: Haskell (build & test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haskell
    steps:
      - uses: actions/checkout@v7
      - name: Install GHC & cabal
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.12.1.0'
      - name: Resolve dependencies
        run: cabal build all --dry-run
      # cabal's plan.json (written by --dry-run above) is the precise cache key:
      # it changes only when a dependency actually changes.
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-ghc${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('haskell/dist-newstyle/cache/plan.json') }}
          restore-keys: ${{ runner.os }}-ghc${{ steps.setup.outputs.ghc-version }}-
      - name: Build
        run: cabal build all
      - name: Test
        # Includes the golden byte-output renders. Note demo/pad/poly are pinned
        # bit-exactly; `tone` is checked against an analytic sine because a raw
        # sine oscillator is not bit-reproducible across libm implementations.
        run: cabal test all --test-show-details=direct

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Two WASM outputs, mirroring web/build.sh:
      #   1. raw module for the AudioWorklet  (std, no wasm-bindgen)
      #   2. wasm-bindgen module for the main thread  (web feature)
      - name: Clippy (web feature, wasm target)
        run: cargo clippy --lib --no-default-features --features web --target wasm32-unknown-unknown -- -D warnings
      - name: Build raw WASM (AudioWorklet)
        run: cargo build --lib --release --target wasm32-unknown-unknown --no-default-features --features std
      - name: Build wasm-bindgen WASM (main thread)
        run: cargo build --lib --release --target wasm32-unknown-unknown --no-default-features --features web
