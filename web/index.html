<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>microsynth</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --border: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text-dim: #8892a4;
            --mono: 'Courier New', Courier, monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
            letter-spacing: 0.1em;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .container {
            width: 100%;
            max-width: 740px;
        }
        .editor-area {
            position: relative;
            margin-bottom: 1rem;
        }
        textarea {
            width: 100%;
            height: 220px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            font-family: var(--mono);
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            tab-size: 2;
        }
        textarea:focus {
            border-color: var(--accent);
        }
        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 0.5rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        button:hover {
            background: var(--border);
        }
        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
        }
        button.primary:hover {
            background: #c73e54;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status {
            font-size: 0.8rem;
            color: var(--text-dim);
            flex: 1;
            text-align: right;
        }
        .status.error {
            color: var(--accent);
        }
        .presets {
            margin-bottom: 1rem;
        }
        .presets label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-right: 0.5rem;
        }
        select {
            padding: 0.35rem 0.5rem;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .scope-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }
        canvas {
            width: 100%;
            height: 150px;
            display: block;
            border-radius: 4px;
        }
        .info {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
        }
        .ugen-list {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 1rem;
            line-height: 1.6;
        }
        .ugen-list code {
            background: var(--surface);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: var(--mono);
            color: var(--text);
        }
    </style>
</head>
<body>
    <h1>microsynth</h1>
    <p class="subtitle">Rust audio synthesis engine in the browser</p>

    <div class="container">
        <div class="presets">
            <label>Presets:</label>
            <select id="preset-select">
                <option value="">— select —</option>
                <option value="sine">Sine tone</option>
                <option value="saw_lpf">Saw + LPF</option>
                <option value="fm">FM synthesis</option>
                <option value="noise_filter">Filtered noise</option>
                <option value="detune">Detuned saws</option>
                <option value="pad">Gentle pad</option>
            </select>
        </div>

        <div class="editor-area">
            <textarea id="editor" spellcheck="false" placeholder="Write your synthdef here...">synthdef tone freq=220.0 amp=0.3 =
    let sig = sinOsc freq 0.0
    sig * amp</textarea>
        </div>

        <div class="controls">
            <button id="play-btn" class="primary" disabled>Loading WASM...</button>
            <button id="stop-btn" disabled>Stop</button>
            <span id="status" class="status"></span>
        </div>

        <div class="scope-container">
            <canvas id="scope"></canvas>
        </div>

        <div class="ugen-list">
            <strong>Available UGens:</strong>
            <code>sinOsc</code> <code>saw</code> <code>pulse</code> <code>tri</code> <code>phasor</code>
            <code>whiteNoise</code> <code>pinkNoise</code>
            <code>lpf</code> <code>hpf</code> <code>bpf</code> <code>onePole</code>
            <code>line</code> <code>asr</code>
            <code>delay</code>
            <code>pan2</code> <code>mix</code> <code>sampleAndHold</code>
        </div>
    </div>

    <script type="module">
        import init, { WebSynth } from './pkg/microsynth.js';

        const PRESETS = {
            sine: `synthdef tone freq=220.0 amp=0.3 =
    let sig = sinOsc freq 0.0
    sig * amp`,

            saw_lpf: `synthdef bass freq=110.0 cutoff=800.0 amp=0.3 =
    let sig = saw freq
    let filt = lpf sig cutoff 2.0
    filt * amp`,

            fm: `synthdef fm carrier=220.0 modfreq=330.0 modamt=200.0 amp=0.25 =
    let mod = sinOsc modfreq 0.0 * modamt
    let sig = sinOsc (carrier + mod) 0.0
    sig * amp`,

            noise_filter: `synthdef wind cutoff=600.0 q=5.0 amp=0.2 =
    let n = whiteNoise
    let filt = bpf n cutoff q
    filt * amp`,

            detune: `synthdef detune freq=110.0 spread=1.5 amp=0.2 =
    let a = saw freq
    let b = saw (freq + spread)
    let c = saw (freq - spread)
    (a + b + c) * amp`,

            pad: `synthdef pad freq=165.0 amp=0.15 =
    let sub = sinOsc freq 0.0
    let mid = tri (freq * 2.0)
    let bright = saw (freq * 3.0) * 0.3
    let mix = sub + mid * 0.5 + bright
    lpf mix 1200.0 0.707 * amp`,
        };

        let synth = null;
        let audioCtx = null;
        let scriptNode = null;
        let analyser = null;
        let isPlaying = false;
        let scopeData = null;
        let animFrame = null;

        const editor = document.getElementById('editor');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusEl = document.getElementById('status');
        const presetSelect = document.getElementById('preset-select');
        const canvas = document.getElementById('scope');
        const ctx2d = canvas.getContext('2d');

        // Handle tab key in textarea
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
            }
        });

        presetSelect.addEventListener('change', () => {
            const key = presetSelect.value;
            if (key && PRESETS[key]) {
                editor.value = PRESETS[key];
                if (isPlaying) {
                    compileAndPlay();
                }
            }
        });

        playBtn.addEventListener('click', compileAndPlay);
        stopBtn.addEventListener('click', stopAudio);

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = isError ? 'status error' : 'status';
        }

        function compileAndPlay() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const sampleRate = audioCtx.sampleRate;
            const bufferSize = 1024;

            // Create a new synth tuned to this AudioContext
            try {
                synth = new WebSynth(sampleRate, 64);
                synth.compileAndLoad(editor.value);
            } catch (e) {
                setStatus(e.message || String(e), true);
                return;
            }

            // Stop previous if playing
            if (scriptNode) {
                scriptNode.disconnect();
                scriptNode = null;
            }

            // Create ScriptProcessorNode
            scriptNode = audioCtx.createScriptProcessor(bufferSize, 0, 2);
            scriptNode.onaudioprocess = (e) => {
                const left = e.outputBuffer.getChannelData(0);
                const right = e.outputBuffer.getChannelData(1);
                synth.render(left, right);
            };

            // Analyser for scope
            if (!analyser) {
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.8;
                scopeData = new Uint8Array(analyser.frequencyBinCount);
            }

            scriptNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            isPlaying = true;
            playBtn.textContent = 'Recompile';
            stopBtn.disabled = false;
            setStatus(`Playing at ${sampleRate} Hz`);

            if (!animFrame) {
                drawScope();
            }
        }

        function stopAudio() {
            if (scriptNode) {
                scriptNode.disconnect();
                scriptNode = null;
            }
            isPlaying = false;
            playBtn.textContent = 'Play';
            stopBtn.disabled = true;
            setStatus('Stopped');
        }

        function drawScope() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx2d.scale(dpr, dpr);
            const w = rect.width;
            const h = rect.height;

            ctx2d.fillStyle = '#0d1117';
            ctx2d.fillRect(0, 0, w, h);

            // Grid lines
            ctx2d.strokeStyle = '#1e2a3a';
            ctx2d.lineWidth = 1;
            ctx2d.beginPath();
            ctx2d.moveTo(0, h / 2);
            ctx2d.lineTo(w, h / 2);
            ctx2d.stroke();

            if (analyser && isPlaying) {
                analyser.getByteTimeDomainData(scopeData);

                ctx2d.strokeStyle = '#e94560';
                ctx2d.lineWidth = 2;
                ctx2d.beginPath();

                const sliceWidth = w / scopeData.length;
                let x = 0;
                for (let i = 0; i < scopeData.length; i++) {
                    const v = scopeData[i] / 128.0;
                    const y = (v * h) / 2;
                    if (i === 0) ctx2d.moveTo(x, y);
                    else ctx2d.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx2d.stroke();
            }

            animFrame = requestAnimationFrame(drawScope);
        }

        // Init WASM
        async function start() {
            try {
                await init();
                playBtn.textContent = 'Play';
                playBtn.disabled = false;
                setStatus('Ready');
            } catch (e) {
                setStatus('Failed to load WASM: ' + e.message, true);
            }
        }

        start();
    </script>
</body>
</html>
